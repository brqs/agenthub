services:
  postgres:
    image: postgres:15-alpine
    container_name: agenthub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthub_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-agenthub}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenthub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        all_proxy: ${all_proxy:-}
    container_name: agenthub-backend
    env_file:
      - .env
    environment:
      # 容器内连库用服务名而非 localhost
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenthub}:${POSTGRES_PASSWORD:-agenthub_dev_pw}@postgres:5432/${POSTGRES_DB:-agenthub}
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_CONTAINER_PUBLIC_BASE_URL: ${DEPLOYMENT_CONTAINER_PUBLIC_BASE_URL:-http://localhost}
      DEPLOYMENT_CONTAINER_HEALTHCHECK_BASE_URL: ${DEPLOYMENT_CONTAINER_HEALTHCHECK_BASE_URL:-http://host.docker.internal}
    ports:
      - "8000:8000"
    volumes:
      # 开发模式：挂载代码以便热重载
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./shared:/shared:ro
      - ./workspaces:/workspaces
      # Trusted local deployment mode: let backend run Docker containers via host Docker.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level ${LOG_LEVEL:-info}

volumes:
  pgdata:
