openapi: 3.0.3
info:
  title: AgentHub API
  version: 0.1.0
  description: |
    AgentHub 多 Agent 协作平台 API。

    详细规范见 docs/api-spec.md。
  contact:
    name: AgentHub Team

servers:
  - url: http://localhost:8000
    description: Local dev

# ───────────────────────────────────────────────────────
# 安全方案
# ───────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─────────────────────────────────────────────────────
  # 数据模型
  # ─────────────────────────────────────────────────────
  schemas:
    # ─── 通用 ───
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: RESOURCE_NOT_FOUND }
            message: { type: string }
            details: { type: object, additionalProperties: true }

    OffsetPagination:
      type: object
      required: [items, total, page, page_size]
      properties:
        items: { type: array, items: {} }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

    CursorPagination:
      type: object
      required: [items, has_more]
      properties:
        items: { type: array, items: {} }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    # ─── ContentBlock 联合类型 ───
    TextBlock:
      type: object
      required: [type, text]
      properties:
        type: { type: string, enum: [text] }
        agent_id: { type: string, nullable: true }
        text: { type: string }

    CodeBlock:
      type: object
      required: [type, language, code]
      properties:
        type: { type: string, enum: [code] }
        agent_id: { type: string, nullable: true }
        language: { type: string }
        code: { type: string }

    DiffBlock:
      type: object
      required: [type, filename, before, after]
      properties:
        type: { type: string, enum: [diff] }
        agent_id: { type: string, nullable: true }
        filename: { type: string }
        before: { type: string }
        after: { type: string }

    WebPreviewBlock:
      type: object
      required: [type, url]
      properties:
        type: { type: string, enum: [web_preview] }
        agent_id: { type: string, nullable: true }
        url: { type: string, format: uri }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        thumbnail_url: { type: string, nullable: true }

    FileBlock:
      type: object
      required: [type, filename, url, size, mime_type]
      properties:
        type: { type: string, enum: [file] }
        agent_id: { type: string, nullable: true }
        filename: { type: string }
        url: { type: string, format: uri }
        size: { type: integer }
        mime_type: { type: string }

    DeploymentStatusBlock:
      type: object
      required: [type, deployment_id, kind, status]
      properties:
        type: { type: string, enum: [deployment_status] }
        deployment_id: { type: string }
        kind: { type: string, enum: [static_site, source_zip, container] }
        status: { type: string, enum: [queued, publishing, published, failed, stopped, not_supported] }
        title: { type: string, nullable: true }
        url: { type: string, nullable: true }
        download_url: { type: string, nullable: true }
        error: { type: string, nullable: true }
        logs_preview: { type: string, nullable: true }
        size_bytes: { type: integer, nullable: true }
        artifact_digest: { type: string, nullable: true }
        file_count: { type: integer, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
        stopped_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        runtime_kind: { type: string, nullable: true }
        runtime_status: { type: string, nullable: true }
        host_port: { type: integer, nullable: true }
        container_port: { type: integer, nullable: true }
        healthcheck_url: { type: string, nullable: true }

    ToolCallBlock:
      type: object
      required: [type, call_id, tool_name, arguments, status]
      properties:
        type: { type: string, enum: [tool_call] }
        agent_id: { type: string, nullable: true }
        call_id: { type: string }
        tool_name: { type: string }
        arguments:
          type: object
          additionalProperties: true
        status: { type: string, enum: [pending, ok, error] }
        output_preview: { type: string, nullable: true }
        output_truncated: { type: boolean, nullable: true }
        error_code: { type: string, nullable: true }

    ContentBlock:
      oneOf:
        - $ref: '#/components/schemas/TextBlock'
        - $ref: '#/components/schemas/CodeBlock'
        - $ref: '#/components/schemas/DiffBlock'
        - $ref: '#/components/schemas/WebPreviewBlock'
        - $ref: '#/components/schemas/FileBlock'
        - $ref: '#/components/schemas/DeploymentStatusBlock'
        - $ref: '#/components/schemas/ToolCallBlock'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/TextBlock'
          code: '#/components/schemas/CodeBlock'
          diff: '#/components/schemas/DiffBlock'
          web_preview: '#/components/schemas/WebPreviewBlock'
          file: '#/components/schemas/FileBlock'
          deployment_status: '#/components/schemas/DeploymentStatusBlock'
          tool_call: '#/components/schemas/ToolCallBlock'

    # ─── User ───
    User:
      type: object
      required: [id, username, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        avatar_url: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_]+$'
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        expires_in: { type: integer, description: 'seconds' }
        user: { $ref: '#/components/schemas/User' }

    # ─── Conversation ───
    ConversationMode:
      type: string
      enum: [single, group]

    Conversation:
      type: object
      required: [id, title, mode, agent_ids, is_pinned, is_archived, last_message_at, created_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        mode: { $ref: '#/components/schemas/ConversationMode' }
        agent_ids:
          type: array
          items: { type: string }
        is_pinned: { type: boolean }
        is_archived: { type: boolean }
        last_message_at: { type: string, format: date-time }
        last_message_preview: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CreateConversationRequest:
      type: object
      required: [title, mode, agent_ids]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        mode: { $ref: '#/components/schemas/ConversationMode' }
        agent_ids:
          type: array
          items: { type: string }
          minItems: 1

    UpdateConversationRequest:
      type: object
      properties:
        title: { type: string }
        is_pinned: { type: boolean }
        is_archived: { type: boolean }

    ConversationList:
      allOf:
        - $ref: '#/components/schemas/OffsetPagination'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Conversation' }

    ConversationMemory:
      type: object
      required:
        - conversation_id
        - summary_text
        - source_message_count
        - source_token_estimate
        - summary_token_estimate
        - algorithm_version
        - created_at
        - updated_at
      properties:
        conversation_id: { type: string, format: uuid }
        summary_text: { type: string }
        summarized_until_message_id:
          type: string
          format: uuid
          nullable: true
        source_message_count: { type: integer }
        source_token_estimate: { type: integer }
        summary_token_estimate: { type: integer }
        algorithm_version: { type: string, example: rules-v1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrchestratorRun:
      type: object
      required: [id, conversation_id, status, user_request, plan_source, final_summary, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        agent_message_id: { type: string, format: uuid, nullable: true }
        user_message_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [running, done, error, cancelled] }
        user_request: { type: string }
        plan_source: { type: string }
        final_summary: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    OrchestratorTask:
      type: object
      required: [id, run_id, task_id, agent_id, title, instruction, depends_on, priority, include_history, final_state, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        task_id: { type: string }
        agent_id: { type: string }
        title: { type: string }
        instruction: { type: string }
        depends_on:
          type: array
          items: { type: string }
        priority: { type: integer }
        expected_output: { type: string, nullable: true }
        include_history: { type: boolean }
        final_state: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrchestratorTaskAttempt:
      type: object
      required: [id, run_id, task_row_id, task_id, attempt_index, agent_id, state, text_preview, tool_summaries, artifact_paths, missing_artifact_paths, created_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        task_row_id: { type: string, format: uuid }
        task_id: { type: string }
        attempt_index: { type: integer }
        agent_id: { type: string }
        state: { type: string }
        text_preview: { type: string }
        tool_summaries:
          type: array
          items: { type: string }
        artifact_paths:
          type: array
          items: { type: string }
        missing_artifact_paths:
          type: array
          items: { type: string }
        error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    OrchestratorRunEvent:
      type: object
      required: [id, run_id, event_type, payload, created_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        event_type: { type: string }
        task_id: { type: string, nullable: true }
        agent_id: { type: string, nullable: true }
        payload: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }

    OrchestratorRunList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OrchestratorRun' }
        total: { type: integer }

    OrchestratorRunDetail:
      type: object
      required: [run, tasks, attempts, events]
      properties:
        run: { $ref: '#/components/schemas/OrchestratorRun' }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/OrchestratorTask' }
        attempts:
          type: array
          items: { $ref: '#/components/schemas/OrchestratorTaskAttempt' }
        events:
          type: array
          items: { $ref: '#/components/schemas/OrchestratorRunEvent' }

    ContextCompressionConfig:
      type: object
      required:
        - mode
        - provider
        - model
        - summary_max_tokens
        - recent_raw_keep
        - api_key_configured
        - api_key_source
        - base_url
        - supported_models
      properties:
        mode: { type: string, enum: [hybrid, rules] }
        provider:
          type: string
          enum: [deepseek, openai, openai_compatible, anthropic]
        model: { type: string, example: deepseek-v4-flash }
        summary_max_tokens: { type: integer, example: 1200 }
        recent_raw_keep: { type: integer, example: 12 }
        api_key_configured: { type: boolean }
        api_key_source:
          type: string
          enum:
            - context_compression_api_key
            - missing
        api_key_preview:
          type: string
          nullable: true
          example: sk-***f0cb
        base_url: { type: string, example: https://api.deepseek.com }
        supported_models:
          type: array
          items: { type: string }

    UpdateContextCompressionConfigRequest:
      type: object
      properties:
        mode: { type: string, enum: [hybrid, rules] }
        provider:
          type: string
          enum: [deepseek, openai, openai_compatible, anthropic, claude]
        model:
          type: string
          example: deepseek-v4-flash
        api_key:
          type: string
          writeOnly: true
        base_url:
          type: string
          example: https://api.deepseek.com
        summary_max_tokens:
          type: integer
          minimum: 256
          maximum: 8192
        recent_raw_keep:
          type: integer
          minimum: 1
          maximum: 100

    ContextCompressionTestRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [deepseek, openai, openai_compatible, anthropic, claude]
        model:
          type: string
          example: deepseek-v4-flash
        api_key:
          type: string
          writeOnly: true
        base_url:
          type: string
          example: https://api.deepseek.com

    ContextCompressionTestResult:
      type: object
      required: [ok, provider, model]
      properties:
        ok: { type: boolean }
        provider: { type: string }
        model: { type: string }
        error_code: { type: string, nullable: true }
        message: { type: string, nullable: true }

    # ─── Message ───
    MessageRole:
      type: string
      enum: [user, agent, system]

    MessageStatus:
      type: string
      enum: [pending, streaming, done, error]

    Message:
      type: object
      required: [id, conversation_id, role, content, status, created_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/MessageRole' }
        agent_id: { type: string, nullable: true }
        content:
          type: array
          items: { $ref: '#/components/schemas/ContentBlock' }
        reply_to_id: { type: string, format: uuid, nullable: true }
        status: { $ref: '#/components/schemas/MessageStatus' }
        is_pinned: { type: boolean, default: false }
        created_at: { type: string, format: date-time }

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/ContentBlock' }
          minItems: 1
        target_agent_id:
          type: string
          nullable: true
          description: '群聊时指定目标 Agent；单聊可省略'

    SendMessageResponse:
      type: object
      required: [user_message, agent_message]
      properties:
        user_message: { $ref: '#/components/schemas/Message' }
        agent_message: { $ref: '#/components/schemas/Message' }

    UpdateMessageRequest:
      type: object
      properties:
        is_pinned: { type: boolean }

    MessageList:
      allOf:
        - $ref: '#/components/schemas/CursorPagination'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Message' }

    # ─── Agent ───
    AgentProvider:
      type: string
      enum: [claude_code, codex, opencode, builtin, mock, claude, deepseek, openai, custom]

    CreatableAgentProvider:
      type: string
      enum: [claude_code, codex, opencode, builtin]

    AgentConfig:
      type: object
      additionalProperties: true
      properties:
        model_backend:
          type: string
          enum: [claude, deepseek, openai]
          description: ModelGateway backend for builtin agents.
        answer_model_backend:
          type: string
          enum: [claude, deepseek, openai]
          description: ModelGateway backend for orchestrator direct answers.
        planner_model_backend:
          type: string
          enum: [claude, deepseek, openai]
          description: ModelGateway backend for orchestrator LLM planning.
        llm_planning:
          type: boolean
          default: true
          description: Whether Orchestrator uses LLM planning for task decomposition.
        planner_fallback_to_template:
          type: boolean
          description: Whether planner failures may fall back to legacy template tasks.
        orchestrator_llm_config:
          type: object
          additionalProperties: true
          description: Model parameters shared by orchestrator planner/replanner.
        max_iterations: { type: integer, minimum: 1, maximum: 50 }
        react_enabled:
          type: boolean
          description: Whether builtin orchestrator uses ReAct dynamic task graph execution.
        react_trace_visible:
          type: boolean
          description: Whether ReAct step/action/observation summaries are visible in chat output.
        react_decision_max_tokens: { type: integer, minimum: 1, maximum: 4096 }
        mcp_servers:
          type: array
          items: { type: object, additionalProperties: true }
        command:
          oneOf:
            - { type: string }
            - type: array
              items: { type: string }
        args:
          type: array
          items: { type: string }
        timeout_seconds: { type: number, minimum: 1, maximum: 3600 }
        max_runtime_seconds: { type: number, minimum: 1, maximum: 3600 }
        idle_timeout_seconds: { type: number, minimum: 1, maximum: 3600 }
        heartbeat_interval_seconds: { type: number, minimum: 1, maximum: 3600 }
        qa_short_circuit_enabled:
          type: boolean
          description: Whether external runtime agents may answer pure Q&A through ModelGateway without starting SDK/CLI.
        qa_model_backend:
          type: string
          enum: [claude, deepseek, openai]
          description: ModelGateway backend for external direct chat.
        qa_model:
          type: string
          nullable: true
        qa_classifier_model:
          type: string
          nullable: true
        qa_max_tokens: { type: integer, minimum: 1, maximum: 32000 }
        qa_classifier_max_tokens: { type: integer, minimum: 1, maximum: 1024 }
        qa_temperature: { type: number, minimum: 0, maximum: 2 }
        qa_request_timeout_seconds: { type: number, minimum: 1, maximum: 120 }
        task_fallback_agent_ids:
          type: array
          items: { type: string }
          description: Optional per-task fallback agents for orchestrator retries.
        max_task_attempts: { type: integer, minimum: 1, maximum: 3 }
        task_result_context_max_chars: { type: integer, minimum: 1, maximum: 32000 }
        task_result_item_max_chars: { type: integer, minimum: 1, maximum: 8000 }
        orchestrator_memory_enabled:
          type: boolean
          description: Whether Orchestrator writes and injects structured run memory.
        orchestrator_memory_recent_runs: { type: integer, minimum: 1, maximum: 10 }
        orchestrator_memory_context_max_chars: { type: integer, minimum: 1, maximum: 32000 }
        orchestrator_tool_calling_enabled:
          type: boolean
          description: Whether Orchestrator uses native tool calling for ordinary task requests.
        orchestrator_tool_trace_visible:
          type: boolean
          description: Whether Orchestrator native tool_call/tool_result events are visible in chat output.
        orchestrator_tool_max_iterations: { type: integer, minimum: 1, maximum: 50 }
        orchestrator_tool_result_max_chars: { type: integer, minimum: 1, maximum: 32000 }
        orchestrator_tool_read_max_bytes: { type: integer, minimum: 1, maximum: 1048576 }
        orchestrator_parallel_enabled:
          type: boolean
          default: true
          description: Whether Orchestrator may execute independent DAG tasks concurrently.
        orchestrator_parallel_max_concurrency: { type: integer, minimum: 1, maximum: 10, default: 3 }

    Agent:
      type: object
      required: [id, name, provider, avatar_url, capabilities, config, is_builtin, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        provider: { $ref: '#/components/schemas/AgentProvider' }
        avatar_url: { type: string }
        capabilities:
          type: array
          items: { type: string }
        system_prompt: { type: string, nullable: true }
        config: { $ref: '#/components/schemas/AgentConfig' }
        is_builtin: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateAgentRequest:
      type: object
      required: [name, provider, config]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        provider: { $ref: '#/components/schemas/CreatableAgentProvider' }
        avatar_url: { type: string, default: '' }
        capabilities:
          type: array
          items: { type: string }
          maxItems: 10
          default: []
        system_prompt: { type: string, nullable: true, maxLength: 8192 }
        config: { $ref: '#/components/schemas/AgentConfig' }

    UpdateAgentRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        avatar_url: { type: string }
        capabilities:
          type: array
          items: { type: string }
          maxItems: 10
        system_prompt: { type: string, nullable: true, maxLength: 8192 }
        config: { $ref: '#/components/schemas/AgentConfig' }

    AgentList:
      allOf:
        - $ref: '#/components/schemas/OffsetPagination'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Agent' }

    WorkspaceTreeNode:
      type: object
      required: [name, path, type]
      properties:
        name: { type: string }
        path: { type: string, description: Path relative to workspace root }
        type: { type: string, enum: [directory, file] }
        children:
          type: array
          items: { $ref: '#/components/schemas/WorkspaceTreeNode' }
        size: { type: integer, nullable: true }
        mime_type: { type: string, nullable: true }

    WorkspaceTreeResponse:
      type: object
      required: [root, tree]
      properties:
        root: { type: string, example: /workspaces/00000000-0000-0000-0000-000000000000 }
        tree: { $ref: '#/components/schemas/WorkspaceTreeNode' }

    WorkspacePreviewRequest:
      type: object
      required: [entry_path]
      properties:
        entry_path: { type: string, minLength: 1, maxLength: 512 }
        mode: { type: string, enum: [static], default: static }
        requested_port: { type: integer, minimum: 1, maximum: 65535, nullable: true }

    WorkspacePreviewResponse:
      type: object
      required: [id, conversation_id, workspace_id, entry_path, mode, port, url, status, created_at, updated_at, last_accessed_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        entry_path: { type: string }
        mode: { type: string, enum: [static] }
        port: { type: integer }
        pid: { type: integer, nullable: true }
        url: { type: string }
        status: { type: string, enum: [starting, running, stopped, error] }
        error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_accessed_at: { type: string, format: date-time }

    WorkspaceDeploymentRequest:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [static_site, source_zip, container] }
        entry_path: { type: string, minLength: 1, maxLength: 512, nullable: true }
        requested_port: { type: integer, minimum: 1, maximum: 65535, nullable: true }
        container_port: { type: integer, minimum: 1, maximum: 65535, nullable: true }
        health_path: { type: string, minLength: 1, maxLength: 256, nullable: true }
        start_command: { type: string, maxLength: 512, nullable: true }

    WorkspaceDeploymentResponse:
      type: object
      required: [id, conversation_id, workspace_id, kind, status, logs, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [static_site, source_zip, container] }
        status: { type: string, enum: [queued, publishing, published, failed, stopped, not_supported] }
        entry_path: { type: string, nullable: true }
        url: { type: string, nullable: true }
        download_url: { type: string, nullable: true }
        error: { type: string, nullable: true }
        logs: { type: array, items: { type: string } }
        size_bytes: { type: integer, nullable: true }
        artifact_digest: { type: string, nullable: true }
        file_count: { type: integer, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
        stopped_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        runtime_id: { type: string, nullable: true }
        image_id: { type: string, nullable: true }
        container_id: { type: string, nullable: true }
        host_port: { type: integer, nullable: true }
        container_port: { type: integer, nullable: true }
        runtime_kind: { type: string, nullable: true }
        runtime_status: { type: string, nullable: true }
        healthcheck_url: { type: string, nullable: true }
        logs_tail: { type: string, nullable: true }
        queued_at: { type: string, format: date-time, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        last_checked_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WorkspaceDeploymentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkspaceDeploymentResponse' }

  # ─── 通用响应 ───
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - BearerAuth: []

# ───────────────────────────────────────────────────────
# 路径
# ───────────────────────────────────────────────────────
paths:
  # ─── Health ───
  /health:
    get:
      summary: Health check
      security: []
      tags: [Misc]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # ─── Auth ───
  /api/v1/auth/register:
    post:
      summary: Register a new user
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/auth/login:
    post:
      summary: Login
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── Conversations ───
  /api/v1/conversations:
    get:
      summary: List conversations
      tags: [Conversations]
      parameters:
        - name: archived
          in: query
          schema: { type: boolean, default: false }
        - name: pinned_only
          in: query
          schema: { type: boolean, default: false }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationList' }
    post:
      summary: Create conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/conversations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get conversation
      tags: [Conversations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateConversationRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
    delete:
      summary: Delete conversation
      tags: [Conversations]
      responses:
        '204': { description: No Content }

  /api/v1/conversations/{id}/memory:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get compressed conversation memory
      tags: [Conversations]
      description: Development-only endpoint for B1 memory debugging.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationMemory' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/conversations/{id}/orchestrator-runs:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: List Orchestrator structured runs
      tags: [Conversations]
      description: Development-only endpoint for Orchestrator memory debugging.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrchestratorRunList' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/conversations/{id}/orchestrator-runs/{run_id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: run_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get Orchestrator structured run detail
      tags: [Conversations]
      description: Development-only endpoint for Orchestrator memory debugging.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrchestratorRunDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/context-compression/config:
    get:
      summary: Get context compression config
      tags: [Context Compression]
      description: Returns active summarizer settings without exposing API keys.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextCompressionConfig' }
    patch:
      summary: Update context compression config
      tags: [Context Compression]
      description: Development-only runtime update for compression model settings.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateContextCompressionConfigRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextCompressionConfig' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/context-compression/config/test:
    post:
      summary: Test context compression config
      tags: [Context Compression]
      description: Development-only connection test for a compression model config.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextCompressionTestRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextCompressionTestResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Messages ───
  /api/v1/conversations/{id}/messages:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: List messages in conversation
      tags: [Messages]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
        - name: direction
          in: query
          schema: { type: string, enum: [before, after], default: before }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageList' }
    post:
      summary: Send message
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendMessageResponse' }

  /api/v1/messages/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      summary: Update message (Pin / Unpin)
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMessageRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
    delete:
      summary: Delete message
      tags: [Messages]
      responses:
        '204': { description: No Content }

  /api/v1/messages/{id}/regenerate:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Regenerate agent message
      tags: [Messages]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }

  /api/v1/messages/{id}/stream:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: SSE stream for agent response
      tags: [Messages]
      description: |
        服务端推送事件流。事件类型见 docs/api-spec.md § 5。
        客户端应使用 fetch-event-source 库（支持自定义 Header）。
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: start
                  data: {"message_id":"...","agent_id":"..."}

                  event: delta
                  data: {"block_index":0,"text_delta":"Hello"}

                  event: tool_call
                  data: {"call_id":"c-001","tool_name":"write_file","tool_arguments":{"path":"App.tsx"}}

                  event: tool_result
                  data: {"call_id":"c-001","tool_status":"ok","tool_output":"wrote 312 bytes"}

                  event: done
                  data: {"message_id":"..."}

  # Workspace & Artifact API
  /api/v1/workspaces/{conversation_id}/tree:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get workspace file tree
      tags: [Workspaces]
      parameters:
        - name: max_depth
          in: query
          schema: { type: integer, default: 5, minimum: 0, maximum: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspaceTreeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/workspaces/{conversation_id}/files/{path}:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: path
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Read workspace file
      tags: [Workspaces]
      responses:
        '200':
          description: File content
          headers:
            X-Content-Type-Options:
              schema: { type: string, example: nosniff }
            Content-Security-Policy:
              schema: { type: string }
              description: Present for text/html responses.
            X-Frame-Options:
              schema: { type: string, example: SAMEORIGIN }
              description: Present for text/html responses.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
            text/plain:
              schema: { type: string }
            text/html:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: File too large
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      summary: Write workspace file
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
          text/plain:
            schema: { type: string }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: File too large
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/workspaces/{conversation_id}/preview:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Start or reuse workspace static preview
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkspacePreviewRequest' }
      responses:
        '201':
          description: Preview session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspacePreviewResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Preview start failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      summary: Get workspace preview status
      tags: [Workspaces]
      responses:
        '200':
          description: Preview session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspacePreviewResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Stop workspace preview
      tags: [Workspaces]
      responses:
        '200':
          description: Stopped preview session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspacePreviewResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/workspaces/{conversation_id}/deployments:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Create a workspace deployment or source export
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkspaceDeploymentRequest' }
      responses:
        '201':
          description: Deployment record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspaceDeploymentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Deployment failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      summary: List workspace deployments
      tags: [Workspaces]
      responses:
        '200':
          description: Deployment records
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspaceDeploymentListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/workspaces/{conversation_id}/deployments/{deployment_id}:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deployment_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get workspace deployment status
      tags: [Workspaces]
      responses:
        '200':
          description: Deployment record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspaceDeploymentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Stop a workspace deployment or delete its source export
      tags: [Workspaces]
      responses:
        '200':
          description: Stopped deployment record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkspaceDeploymentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/workspaces/{conversation_id}/deployments/{deployment_id}/download:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deployment_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Download a workspace source export
      tags: [Workspaces]
      responses:
        '200':
          description: Source zip archive
          content:
            application/zip:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /releases/{release_token}:
    get:
      summary: Read the HTML entry of a published immutable static release
      tags: [Releases]
      parameters:
        - name: release_token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Released static HTML entry
          content:
            text/html:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /releases/{release_token}/{path}:
    get:
      summary: Read one public file from a published immutable static release
      tags: [Releases]
      parameters:
        - name: release_token
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: path
          required: true
          description: Nested static resource path.
          schema: { type: string }
      responses:
        '200':
          description: Released static resource
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Agents ───
  /api/v1/agents:
    get:
      summary: List agents
      tags: [Agents]
      parameters:
        - name: builtin
          in: query
          schema: { type: boolean }
        - name: provider
          in: query
          schema: { $ref: '#/components/schemas/AgentProvider' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentList' }
    post:
      summary: Create agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAgentRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

  /api/v1/agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get agent
      tags: [Agents]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
    patch:
      summary: Update agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAgentRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
    delete:
      summary: Delete agent
      tags: [Agents]
      responses:
        '204': { description: No Content }
