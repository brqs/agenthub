<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AgentHub</title>
    <meta name="description" content="像聊微信一样，与多个 AI 协作完成复杂任务" />
    <script>
      (() => {
        const fallbackPreference = 'system';
        const fallbackTheme = 'dark';
        try {
          const raw = window.localStorage.getItem('agenthub-ui');
          const parsed = raw ? JSON.parse(raw) : null;
          const state = parsed?.state ?? {};
          const preference = state.themePreference ?? state.theme ?? fallbackPreference;
          const systemDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? true;
          const resolvedTheme = preference === 'light' || (preference === 'system' && !systemDark)
            ? 'light'
            : fallbackTheme;
          document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = fallbackTheme;
          document.documentElement.dataset.themePreference = fallbackPreference;
          document.documentElement.style.colorScheme = fallbackTheme;
        }
      })();
    </script>
  </head>
  <body class="bg-white text-gray-900 dark:bg-slate-900 dark:text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
