# AgentHub 前端 SPA 站点配置
server {
  listen      80 default_server;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # 静态资源缓存：带 hash 的 Vite 产物可长缓存，HTML 不缓存
  location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico|webp|map)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, no-transform";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # 后端 API 代理：前端保持同源请求 /api/...，由 Nginx 转发到后端。
  # 这样浏览器不会从 http://154.44.25.94:1573 直接跨域请求后端，避免 CORS 预检失败。
  # ^~ 避免 workspace 嵌套文件（如 /files/src/app.js）被静态资源正则截获。
  location ^~ /api/ {
    proxy_pass         http://111.229.151.159:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $proxy_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;

    # SSE / 流式接口需要关闭缓冲，并保持长连接。
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
  }

  # SPA fallback：所有未匹配路径回 index.html，让 React Router 接管
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 压缩
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_types        text/plain text/css application/json application/javascript
                    application/xml application/xml+rss text/xml text/javascript
                    image/svg+xml font/ttf font/otf;
  gzip_proxied      any;
}
